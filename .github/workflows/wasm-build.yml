name: Build WASM

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libplist-dev libssl-dev pkg-config

      - name: Install Emscripten and compile
        run: |
          cd ~
          git clone https://github.com/emscripten-core/emsdk.git
          cd emsdk
          ./emsdk install latest
          ./emsdk activate latest
          source ./emsdk_env.sh
          
          # Install Emscripten ports
          embuilder build openssl zlib
          
          cd $GITHUB_WORKSPACE
          emcc -O2 -std=c++11 \
            -I. \
            -s USE_OPENSSL=1 \
            -s USE_ZLIB=1 \
            ldid.cpp \
            -o ldid.js

      - name: Upload WASM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ldid-wasm
          path: |
            ldid.wasm
            ldid.js
