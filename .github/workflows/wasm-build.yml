name: Build WASM

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Emscripten
        uses: emscripten-core/emsdk-action@v1.0.0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libplist-dev libssl-dev pkg-config

      - name: Compile with Emscripten
        run: |
          source /opt/emsdk/emsdk_env.sh
          emcxx -O2 -std=c++11 \
            -I. \
            $(pkg-config --cflags libplist-2.0 libcrypto 2>/dev/null || echo "") \
            ldid.cpp \
            $(pkg-config --libs libplist-2.0 libcrypto 2>/dev/null || echo "-lcrypto") \
            -o ldid.js

      - name: Upload WASM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ldid-wasm
          path: |
            ldid.wasm
            ldid.js
